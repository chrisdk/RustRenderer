<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Path Tracer</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0a;
            font-family: system-ui, sans-serif;
            color: #fff;
        }

        /* ── Left control panel ────────────────────────────────────────────── */

        #panel {
            width: 220px;
            flex-shrink: 0;
            height: 100vh;
            background: #111;
            border-right: 1px solid rgba(255,255,255,0.08);
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        #panel-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.30);
            padding: 2px 2px 4px;
        }

        #status {
            font-size: 12px;
            line-height: 1.5;
            color: rgba(255,255,255,0.60);
            padding: 8px 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
        }

        /* ── Scene picker ──────────────────────────────────────────────────── */

        #scene-picker {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #scene-picker-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.10em;
            color: rgba(255,255,255,0.30);
            padding: 6px 2px 0;
        }

        #scene-picker-source {
            padding: 1px 2px 4px;
        }
        #scene-picker-source a {
            font-size: 10px;
            color: rgba(255,255,255,0.22);
            text-decoration: none;
            transition: color 0.12s;
        }
        #scene-picker-source a:hover { color: rgba(255,255,255,0.55); }

        .scene-attribution {
            font-size: 10px;
            color: rgba(255,255,255,0.28);
            padding: 1px 4px 5px 10px;
            font-style: italic;
        }

        .scene-btn {
            width: 100%;
            text-align: left;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 6px;
            color: #ddd;
            cursor: pointer;
            font-size: 13px;
            padding: 7px 10px;
            transition: background 0.12s;
        }
        .scene-btn:hover  { background: rgba(255,255,255,0.12); color: #fff; }
        .scene-btn.active { background: rgba(255,255,255,0.15);
                            border-color: rgba(255,255,255,0.35); color: #fff; }

        /* ── Render button ─────────────────────────────────────────────────── */

        #render-btn {
            width: 100%;
            text-align: center;
            background: rgba(70, 130, 255, 0.22);
            border: 1px solid rgba(110, 165, 255, 0.45);
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            padding: 9px 10px;
            transition: background 0.12s;
            margin-top: 4px;
        }
        #render-btn:hover    { background: rgba(70, 130, 255, 0.38); }
        #render-btn:disabled { opacity: 0.30; cursor: default; }
        #render-btn.cancel   { background: rgba(210, 65, 45, 0.28);
                               border-color: rgba(255, 105, 85, 0.45); }
        #render-btn.cancel:hover { background: rgba(210, 65, 45, 0.44); }

        /* ── Divider ───────────────────────────────────────────────────────── */

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.07);
            margin: 4px 0;
        }

        /* ── Load file ─────────────────────────────────────────────────────── */

        #load-btn {
            display: block;
            text-align: center;
            color: rgba(255,255,255,0.35);
            font-size: 11px;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: color 0.12s;
        }
        #load-btn:hover { color: rgba(255,255,255,0.65); }

        #file-input { display: none; }

        /* ── Canvas area (right side) ──────────────────────────────────────── */

        #canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        canvas.dragging { cursor: grabbing; }

        /* ── Controls hint (bottom-centre of canvas) ───────────────────────── */

        #hints {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 6px;
            padding: 5px 14px;
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            white-space: nowrap;
            pointer-events: none;
            backdrop-filter: blur(4px);
            transition: opacity 0.5s;
        }
        #hints.fade { opacity: 0; }

        /* ── Drag-and-drop overlay (covers canvas area only) ───────────────── */

        #drop-overlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.55);
            font-size: 20px;
            font-weight: 500;
            border: 3px dashed rgba(255,255,255,0.35);
            border-radius: 10px;
            margin: 20px;
            pointer-events: none;
        }
        #drop-overlay.active { display: flex; }
    </style>
</head>
<body>
    <div id="panel">
        <div id="panel-title">Path Tracer</div>

        <div id="status">Initializing…</div>

        <div id="scene-picker">
            <div id="scene-picker-label">Scenes</div>
            <div id="scene-picker-source">
                <a href="https://github.com/KhronosGroup/glTF-Sample-Assets"
                   target="_blank" rel="noopener">Khronos glTF Sample Assets ↗</a>
            </div>
            <!-- buttons injected by index.ts -->
        </div>

        <div class="divider"></div>

        <button id="render-btn" disabled>Render</button>

        <div class="divider"></div>

        <label id="load-btn" for="file-input">Load GLB / GLTF…</label>
        <input id="file-input" type="file" accept=".gltf,.glb">
    </div>

    <div id="canvas-wrap">
        <canvas id="canvas"></canvas>

        <div id="hints">Drag to spin</div>

        <div id="drop-overlay">Drop GLTF / GLB here</div>
    </div>

    <script type="module" src="dist/index.js"></script>
</body>
</html>
